name: DevOps / CI Failure Alert

on:
  workflow_run:
    workflows:
      - CI
      - Self Test
      - DevOps / Security
    types: [completed]

permissions:
  pull-requests: write

jobs:
  alert:
    if: github.event.workflow_run.conclusion == 'failure'
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflow-failure-alert.yml@a02d736d25fa99fca8b4b623af9467d7afc472a4 # v1.0.3
    permissions:
      pull-requests: write
