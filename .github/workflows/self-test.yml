name: Self Test

on:
  push:
    branches: [main]

# Validates that every workflow defined in this library functions correctly
# against the minimal example image in examples/hello/.
#
# Note: Self-test builds and scans a local image for pull requests. On main
# branch push events, it also pushes an image to GHCR and runs signing.
#
# container-scan-snyk requires SNYK_TOKEN to be configured in the repository and
# is gated to skip on fork pull requests.

permissions:
  contents: read
  actions: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  workflows-policy:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@fc5fcac8c2cfe0ccd8d18b73383df445ec31e371 # main

  codeql-actions:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@fc5fcac8c2cfe0ccd8d18b73383df445ec31e371 # main
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  lint:
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-lint.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      containerfile: examples/hello/Containerfile
      hadolint-config: .hadolint.yaml

  build:
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-build.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image: hello-example-container
      context: examples/hello
      containerfile: examples/hello/Containerfile
      push: false

  build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-build.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image: ghcr.io/${{ github.repository_owner }}/hello-example-container
      context: examples/hello
      containerfile: examples/hello/Containerfile
      push: true

  sign:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-push.outputs.image_ref != ''
    needs: [build-push]
    permissions:
      contents: read
      id-token: write
      packages: write
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-sign.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image-ref: ${{ needs.build-push.outputs.image_ref }}

  scan-grype:
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-scan-grype.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
      severity: critical

  scan-trivy:
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-scan-trivy.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
      severity: CRITICAL

  scan-snyk:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-scan-snyk.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sbom:
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-sbom.yml@ec49b9a5eeea8286d468e6b658dc8fca65ca2931 # main
    with:
      image-name: hello-example-container
      containerfile: examples/hello/Containerfile
      context: examples/hello
