name: Container Sign

on:
  workflow_call:
    inputs:
      image-ref:
        description: "Fully-qualified pushed image reference to sign (e.g. ghcr.io/owner/image:sha)"
        type: string
        required: true

# id-token: write is required for cosign keyless OIDC signing.
# The calling workflow must grant this permission at the workflow level.
permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  sign:
    name: Cosign (keyless)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image
        env:
          IMAGE_REF: ${{ inputs.image-ref }}
        run: |
          set -euo pipefail
          echo "Signing image: ${IMAGE_REF}"
          cosign sign --yes "$IMAGE_REF"
          echo "Image signed successfully."
