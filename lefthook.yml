# lefthook.yml — container workflow library hooks
# pre-commit: fast (<20 s) — hygiene + secrets
# pre-push:   deeper (<90 s) — hadolint on examples

pre-commit:
  parallel: true
  commands:
    hygiene-merge-markers:
      run: ./scripts/hooks/check_merge_markers.sh
    hygiene-large-files:
      run: ./scripts/hooks/check_large_files.sh
    hygiene-binary-files:
      run: ./scripts/hooks/check_binary_files.sh
    secret-scan:
      run: make secrets-scan-staged

pre-push:
  parallel: false
  commands:
    lint:
      run: make lint

commit-msg:
  commands:
    conventional-commits:
      run: ./scripts/hooks/check_commit_msg.sh {1}
